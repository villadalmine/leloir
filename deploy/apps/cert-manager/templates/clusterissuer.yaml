# ClusterIssuer staging — para probar sin quemar el rate limit de producción
# Usa DNS-01 via acme-dns.io → no requiere puerto 80 expuesto.
# Pre-requisito: secret "acme-dns-account" en namespace cert-manager (ver scripts/acme-dns-register.sh)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: villadalmine@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - dns01:
          acmeDNS:
            host: https://auth.acme-dns.io
            accountSecretRef:
              name: acme-dns-account
              key: credentials.json

---
# ClusterIssuer producción — usar cuando staging funcione
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: villadalmine@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          acmeDNS:
            host: https://auth.acme-dns.io
            accountSecretRef:
              name: acme-dns-account
              key: credentials.json
