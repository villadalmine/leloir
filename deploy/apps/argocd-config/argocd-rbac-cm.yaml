apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  # scopes: incluir email además de groups para que g, user@email, role:admin funcione.
  # Sin email en scopes, ArgoCD solo matchea federated_claims.user_id (ej. "1070184").
  scopes: '[groups, email]'
  policy.csv: |
    g, villadalmine@gmail.com, role:admin
  policy.default: "role:"
