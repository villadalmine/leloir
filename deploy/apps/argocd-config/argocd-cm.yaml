apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  url: https://argocd.leloir.cybercirujas.club
  admin.enabled: "false"
  server.rbac.log.enforce.enable: "true"
  dex.config: |
    connectors:
    - type: github
      id: github
      name: GitHub
      config:
        clientID: $dex.github.clientID
        clientSecret: $dex.github.clientSecret
        redirectURI: https://argocd.leloir.cybercirujas.club/api/dex/callback
        getUserInfo: true
        userNameKey: login
