# values.yaml — kube-prometheus-stack para Leloir
# Configurado para single-node (k3s/kind/minikube) con recursos reducidos.

kube-prometheus-stack:
  grafana:
    enabled: true
    adminPassword: "leloir-poc"
    service:
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - grafana.leloir.cybercirujas.club
      paths:
        - /

  prometheus:
    prometheusSpec:
      retention: 6h
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
    config:
      global:
        resolve_timeout: 1m
      route:
        group_by: ["alertname", "namespace"]
        group_wait: 10s
        group_interval: 30s
        repeat_interval: 1h
        receiver: "leloir-poc"
      receivers:
        - name: "null"
        - name: "leloir-poc"
          webhook_configs:
            - url: "http://host.containers.internal:3000/webhook"
              send_resolved: true

  kubeStateMetrics:
    enabled: true

  nodeExporter:
    enabled: false

  kubeApiServer:
    enabled: false

  kubelet:
    enabled: false

  kubeControllerManager:
    enabled: false

  kubeScheduler:
    enabled: false

  kubeProxy:
    enabled: false

  kubeEtcd:
    enabled: false

  defaultRules:
    create: false
