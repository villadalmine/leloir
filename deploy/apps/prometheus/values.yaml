# values.yaml — kube-prometheus-stack para Leloir
# Configurado para single-node (k3s/kind/minikube) con recursos reducidos.

kube-prometheus-stack:
  grafana:
    enabled: true
    adminPassword: "leloir-poc"
    service:
      type: ClusterIP

    # GitHub OAuth — secret creado por scripts/github-oauth-setup.sh (no está en git)
    envValueFrom:
      GF_AUTH_GITHUB_CLIENT_ID:
        secretKeyRef:
          name: grafana-github-oauth
          key: client-id
      GF_AUTH_GITHUB_CLIENT_SECRET:
        secretKeyRef:
          name: grafana-github-oauth
          key: client-secret

    grafana.ini:
      server:
        domain: grafana.leloir.cybercirujas.club
        root_url: https://grafana.leloir.cybercirujas.club/
      auth.github:
        enabled: true
        allow_sign_up: true
        scopes: user:email,read:org
        auth_url: https://github.com/login/oauth/authorize
        token_url: https://github.com/login/oauth/access_token
        api_url: https://api.github.com/user
        client_id: $__env{GF_AUTH_GITHUB_CLIENT_ID}
        client_secret: $__env{GF_AUTH_GITHUB_CLIENT_SECRET}
        # villadalmine → Admin, cualquier otro GitHub user → Viewer
        role_attribute_path: "contains(['villadalmine'], login) && 'Admin' || 'Viewer'"

    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - grafana.leloir.cybercirujas.club
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.leloir.cybercirujas.club
      paths:
        - /

  prometheus:
    prometheusSpec:
      retention: 6h
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
    config:
      global:
        resolve_timeout: 1m
      route:
        group_by: ["alertname", "namespace"]
        group_wait: 10s
        group_interval: 30s
        repeat_interval: 1h
        receiver: "leloir-poc"
      receivers:
        - name: "null"
        - name: "leloir-poc"
          webhook_configs:
            - url: "http://host.containers.internal:3000/webhook"
              send_resolved: true

  kubeStateMetrics:
    enabled: true

  nodeExporter:
    enabled: false

  kubeApiServer:
    enabled: false

  kubelet:
    enabled: false

  kubeControllerManager:
    enabled: false

  kubeScheduler:
    enabled: false

  kubeProxy:
    enabled: false

  kubeEtcd:
    enabled: false

  defaultRules:
    create: false
