apiVersion: apps/v1
kind: Deployment
metadata:
  name: leloir-poc
  namespace: {{ .Release.Namespace }}
  labels:
    app: leloir-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leloir-poc
  template:
    metadata:
      labels:
        app: leloir-poc
    spec:
      containers:
        - name: leloir-poc
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3001
          env:
            - name: HOLMES_URL
              value: "{{ .Values.holmes.url }}"
            - name: HOLMES_MODEL
              value: "{{ .Values.holmes.model }}"
            - name: LISTEN_ADDR
              value: ":3001"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 128Mi
