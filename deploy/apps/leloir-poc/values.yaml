# values.yaml — Leloir PoC
#
# Pre-requisitos (una sola vez):
#   1. Build + push imagen:  ./scripts/build-poc.sh
#   2. Crear GitHub OAuth App + secret K8s:  ./scripts/github-poc-oauth-setup.sh
#   3. Agregar CNAME DNS para poc.leloir.cybercirujas.club (ver acme-dns-register.sh)

# ── App ───────────────────────────────────────────────────────────────────────
image:
  repository: ghcr.io/villadalmine/leloir-poc
  tag: latest
  pullPolicy: Always
  pullSecret: ghcr-pull-secret

holmes:
  url: http://holmesgpt-holmes.holmesgpt:80
  model: gemma4-31b
  fallback: nemotron-super

ingress:
  host: poc.leloir.cybercirujas.club
  tlsSecret: leloir-poc-tls

# ── oauth2-proxy ──────────────────────────────────────────────────────────────
# Imagen oficial: quay.io/oauth2-proxy/oauth2-proxy
# Secret requerido (creado por scripts/github-poc-oauth-setup.sh):
#   kubectl create secret generic leloir-poc-oauth -n leloir-poc \
#     --from-literal=client-id=<GITHUB_CLIENT_ID> \
#     --from-literal=client-secret=<GITHUB_CLIENT_SECRET> \
#     --from-literal=cookie-secret=<32-bytes-base64>
oauth2proxy:
  image: quay.io/oauth2-proxy/oauth2-proxy:latest
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
