# values.yaml — HolmesGPT para Leloir PoC
# LLM: OpenRouter con modelos gratuitos (Qwen3 80B)
# Secret: kubectl create secret generic holmes-secrets \
#           --from-literal=openrouter-api-key="sk-or-..." \
#           -n holmesgpt

holmes:
  operator:
    enabled: true
    holmesApiTimeout: 300
    maxHistoryItems: 10

  additionalEnvVars:
    - name: LOG_LEVEL
      value: "WARNING"
    - name: OPENROUTER_API_KEY
      valueFrom:
        secretKeyRef:
          name: holmes-secrets
          key: openrouter-api-key
    - name: OVERRIDE_MAX_OUTPUT_TOKEN
      value: "4096"
    - name: OVERRIDE_MAX_CONTENT_SIZE
      value: "128000"

  modelList:
    # Modelos free con distintos providers para evitar rate limit simultáneo
    gemma4-31b:
      api_key: "{{ env.OPENROUTER_API_KEY }}"
      model: openrouter/google/gemma-4-31b-it:free
      temperature: 0

    nemotron-super:
      api_key: "{{ env.OPENROUTER_API_KEY }}"
      model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
      temperature: 0

    qwen3-80b:
      api_key: "{{ env.OPENROUTER_API_KEY }}"
      model: openrouter/qwen/qwen3-next-80b-a3b-instruct:free
      temperature: 0

  config:
    model: "gemma4-31b"
