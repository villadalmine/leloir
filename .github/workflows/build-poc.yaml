name: Build & Push leloir-poc

on:
  push:
    branches: [main]
    paths:
      - "poc/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          docker build -t ghcr.io/villadalmine/leloir-poc:latest ./poc
          docker push ghcr.io/villadalmine/leloir-poc:latest
