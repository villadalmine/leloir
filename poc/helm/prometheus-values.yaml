# prometheus-values.yaml — kube-prometheus-stack para Leloir M0 PoC
# Deploy: helm install prom prometheus-community/kube-prometheus-stack \
#           -n monitoring --create-namespace -f poc/helm/prometheus-values.yaml
#
# Configurado para single-node (k3s/kind/minikube) con recursos reducidos.
# Alertmanager ya apunta al webhook receiver del PoC (ajustar URL si cambia el puerto).

grafana:
  enabled: true
  adminPassword: "leloir-poc"
  service:
    type: NodePort
    nodePort: 30300

prometheus:
  prometheusSpec:
    # Retención corta para el PoC
    retention: 6h
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
  config:
    global:
      resolve_timeout: 1m
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 1h
      receiver: "leloir-poc"
    receivers:
      - name: "null"
      - name: "leloir-poc"
        webhook_configs:
          # URL del webhook receiver del PoC (ajustar IP si es necesario)
          # En k3s/kind con port-forward: usar host.containers.internal o la IP del host
          - url: "http://host.containers.internal:3000/webhook"
            send_resolved: true

# Reducir componentes innecesarios para el PoC
kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: false

kubeApiServer:
  enabled: false

kubelet:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false

defaultRules:
  create: false
